<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PHANTOM VI - Custom Bottles</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
  <img src="images/logo.png" class="logo" />
  <p>Custom Wine, Gin & Vodka Made in Colesberg</p>

  <p style="margin-top:10px; font-size:14px; color:#9b4c62;">
    Nationwide Delivery • Secure Payments • Custom Branding Available
  </p>

  <nav>
    <a href="#products">Products</a>
    <a href="#cart">Order</a>
  </nav>
</header>

<main>

<section id="products" class="products">

  <!-- WINE -->
  <div class="product">
    <h2>Wine</h2>
    <select id="wineType">
      <option value="">Select</option>
      <option>Sweet Rosé</option>
      <option>Shiraz</option>
    </select>
    <input type="number" id="wineQty" placeholder="Qty" />
    <button onclick="handleAdd('Wine')">Add</button>
  </div>

  <!-- GIN -->
  <div class="product">
    <h2>Gin</h2>
    <select id="ginType">
      <option value="">Select</option>
      <option>London Dry</option>
      <option>Strawberry</option>
    </select>
    <input type="number" id="ginQty" placeholder="Qty" />
    <button onclick="handleAdd('Gin')">Add</button>
  </div>

  <!-- VODKA -->
  <div class="product">
    <h2>Vodka</h2>
    <select id="vodkaType">
      <option value="">Select</option>
      <option>Vanilla</option>
    </select>
    <input type="number" id="vodkaQty" placeholder="Qty" />
    <button onclick="handleAdd('Vodka')">Add</button>
  </div>

</section>

<section id="cart" class="cart">
  <h3>Cart</h3>
  <ul id="cartItems"></ul>

  <input id="custName" placeholder="Name" />
  <input id="custPhone" placeholder="Phone" />
  <input id="custAddress" placeholder="Address" />

  <h3>Total: <span id="grandTotal">R0</span></h3>

  <button id="ikhokhaBtn">Pay Now</button>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
