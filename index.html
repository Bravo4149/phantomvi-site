<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Phantom VI</title>
</head>
<body>

<h1>PHANTOM VI</h1>

<!-- PRODUCTS -->
<h2>Wine</h2>
<select id="wineType">
  <option value="">Select Wine</option>
  <option>Sweet Rosé</option>
  <option>Shiraz</option>
</select>
<input type="number" id="wineQty" placeholder="Qty">
<button onclick="addToCart('Wine')">Add Wine</button>

<h2>Gin</h2>
<select id="ginType">
  <option value="">Select Gin</option>
  <option>London Dry</option>
</select>
<input type="number" id="ginQty" placeholder="Qty">
<button onclick="addToCart('Gin')">Add Gin</button>

<h2>Vodka</h2>
<select id="vodkaType">
  <option value="">Select Vodka</option>
  <option>Vanilla</option>
</select>
<input type="number" id="vodkaQty" placeholder="Qty">
<button onclick="addToCart('Vodka')">Add Vodka</button>

<hr>

<!-- CART -->
<h2>Cart</h2>
<ul id="cartItems"></ul>
<p id="emptyCartMessage">Cart is empty</p>

<p>Subtotal: <span id="itemsSubtotal">R0</span></p>
<p>Courier: <span id="courierFee">R0</span></p>
<h3>Total: <span id="grandTotal">R0</span></h3>

<hr>

<!-- CUSTOMER -->
<h2>Details</h2>
<input id="custName" placeholder="Name"><br>
<input id="custPhone" placeholder="Phone"><br>
<input id="custAddress" placeholder="Address"><br>

<br>

<!-- BUTTON -->
<button id="payBtn">Secure Checkout</button>

<script src="script.js"></script>
</body>
</html>
