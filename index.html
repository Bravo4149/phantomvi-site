<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PHANTOM VI - Custom Bottles</title>

  <!-- CSS LINK -->
  <link rel="stylesheet" href="style.css" />

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <img src="images/logo.png" class="logo" />
  <p>Custom Wine, Gin & Vodka</p>

  <nav>
    <a href="#products">Products</a>
    <a href="#cart">Cart</a>
  </nav>
</header>

<main>

<!-- PRODUCTS -->
<section id="products" class="products">

  <!-- WINE -->
  <div class="product">
    <h2>Wine</h2>

    <select id="wineType">
      <option value="">Select Wine</option>
      <option>Sweet Rosé</option>
      <option>Shiraz</option>
      <option>Merlot</option>
      <option>Non-Alcoholic Wine</option>
    </select>

    <input type="number" id="wineQty" placeholder="Qty" />

    <button onclick="addToCart('Wine')">Add to Cart</button>
  </div>

  <!-- GIN -->
  <div class="product">
    <h2>Gin</h2>

    <select id="ginType">
      <option value="">Select Gin</option>
      <option>London Dry</option>
      <option>Strawberry</option>
    </select>

    <input type="number" id="ginQty" placeholder="Qty" />

    <button onclick="addToCart('Gin')">Add to Cart</button>
  </div>

  <!-- VODKA -->
  <div class="product">
    <h2>Vodka</h2>

    <select id="vodkaType">
      <option value="">Select Vodka</option>
      <option>Vanilla</option>
      <option>Triple Distilled</option>
    </select>

    <input type="number" id="vodkaQty" placeholder="Qty" />

    <button onclick="addToCart('Vodka')">Add to Cart</button>
  </div>

</section>

<!-- CART -->
<section id="cart" class="cart">

  <h3>Cart</h3>

  <ul id="cartItems"></ul>

  <p id="emptyCartMessage">Your cart is empty</p>

  <!-- CUSTOMER -->
  <input id="custName" placeholder="Name" />
  <input id="custPhone" placeholder="Phone" />
  <input id="custAddress" placeholder="Address" />

  <!-- TOTALS -->
  <p>Items: <span id="itemsSubtotal">R0</span></p>
  <p>Courier: <span id="courierFee">R0</span></p>
  <p>Addons: <span id="addonsTotal">R0</span></p>

  <h2>Total: <span id="grandTotal">R0</span></h2>

  <!-- BUTTONS -->
  <button id="ikhokhaBtn">Pay</button>
  <a id="whatsappBtn" href="#">WhatsApp</a>

</section>

</main>

<!-- JS LINK -->
<script src="script.js"></script>

</body>
</html>
