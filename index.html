<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PHANTOM VI</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header>
  <h1>PHANTOM VI</h1>
</header>

<main>

<!-- PRODUCTS -->
<section id="products">

  <h2>Wine</h2>
  <select id="wineType">
    <option value="">Select Wine</option>
    <option>Sweet Rosé</option>
    <option>Shiraz</option>
    <option>Sauvignon Blanc</option>
    <option>Pinotage</option>
    <option>Sweet White</option>
    <option>Sweet Red</option>
    <option>Chenin Blanc</option>
    <option>Chardonnay</option>
    <option>Cabernet Sauvignon</option>
    <option>Merlot</option>
    <option>Coffee Pinotage</option>
    <option>Non-Alcoholic Wine</option>
  </select>
  <input type="number" id="wineQty" placeholder="Qty">
  <button onclick="addToCart('Wine')">Add Wine</button>

  <h2>Gin</h2>
  <select id="ginType">
    <option value="">Select Gin</option>
    <option>London Dry</option>
    <option>Strawberry</option>
    <option>Apple & Cinnamon</option>
    <option>Blueberry</option>
    <option>Orange & Lime</option>
    <option>Lavender Infused</option>
  </select>
  <input type="number" id="ginQty" placeholder="Qty">
  <button onclick="addToCart('Gin')">Add Gin</button>

  <h2>Vodka</h2>
  <select id="vodkaType">
    <option value="">Select Vodka</option>
    <option>Vanilla</option>
    <option>Triple Distilled</option>
  </select>
  <input type="number" id="vodkaQty" placeholder="Qty">
  <button onclick="addToCart('Vodka')">Add Vodka</button>

</section>

<!-- CART -->
<section id="cart">

  <h2>Cart</h2>
  <ul id="cartItems"></ul>
  <p id="emptyCartMessage">Your cart is empty.</p>

  <!-- ADDONS -->
  <h3>Add-ons</h3>

  <button id="addonLabelDesign">Label Design (R500)</button>
  <button id="addonInsurance">Insurance (auto)</button>

  <div>
    Barcode:
    <button id="barcodeMinus">-</button>
    <span id="barcodeCount">0</span>
    <button id="barcodePlus">+</button>
  </div>

  <!-- CUSTOMER -->
  <h3>Details</h3>
  <input id="custName" placeholder="Name">
  <input id="custPhone" placeholder="Phone">
  <input id="custAddress" placeholder="Address">
  <input id="custCity" placeholder="City">
  <input id="custPostal" placeholder="Postal">

  <!-- TOTALS -->
  <h3>Total: <span id="grandTotal">R0</span></h3>

  <!-- ACTIONS -->
  <button id="ikhokhaBtn">Pay Now</button>
  <a id="whatsappBtn" href="#">WhatsApp</a>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
